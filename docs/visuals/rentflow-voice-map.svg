      <text x="26" y="60" fill="#F0EFF8" font-family="Inter, Arial" font-size="17">"Room 103 ka 2500 rent add karo"</text>
      <rect y="112" width="360" height="82" rx="24" fill="#161625" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="26" y="146" fill="#FFB800" font-family="Inter, Arial" font-size="16" font-weight="850">Due query</text>
      <text x="26" y="172" fill="#F0EFF8" font-family="Inter, Arial" font-size="17">"Kaunse room ka rent pending hai?"</text>
      <rect y="224" width="360" height="82" rx="24" fill="#161625" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="26" y="258" fill="#6C63FF" font-family="Inter, Arial" font-size="16" font-weight="850">Reminder</text>
      <text x="26" y="284" fill="#F0EFF8" font-family="Inter, Arial" font-size="17">"Rohit ko reminder bhejo"</text>
    </g>

    <g transform="translate(960 180)">
      <rect width="360" height="82" rx="24" fill="#161625" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="26" y="34" fill="#4D9EFF" font-family="Inter, Arial" font-size="16" font-weight="850">Call tenant</text>
      <text x="26" y="60" fill="#F0EFF8" font-family="Inter, Arial" font-size="17">"Ramesh ko call lagao"</text>
      <rect y="112" width="360" height="82" rx="24" fill="#161625" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="26" y="146" fill="#FF4D6D" font-family="Inter, Arial" font-size="16" font-weight="850">Document view</text>
      <text x="26" y="172" fill="#F0EFF8" font-family="Inter, Arial" font-size="17">"Ramesh ka document dikhao"</text>
      <rect y="224" width="360" height="82" rx="24" fill="#161625" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="26" y="258" fill="#00D9A3" font-family="Inter, Arial" font-size="16" font-weight="850">Document upload</text>
      <text x="26" y="284" fill="#F0EFF8" font-family="Inter, Arial" font-size="17">"Madan ka document upload karna hai"</text>
    </g>
