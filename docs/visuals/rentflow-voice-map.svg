  <path d="M440 222C488 240 510 274 545 304" stroke="#00D9A3" stroke-width="3" stroke-opacity="0.72"/>
  <path d="M440 334C488 334 510 334 545 334" stroke="#FFB800" stroke-width="3" stroke-opacity="0.72"/>
  <path d="M440 446C490 424 516 390 545 365" stroke="#6C63FF" stroke-width="3" stroke-opacity="0.72"/>
  <path d="M960 222C910 240 886 274 855 304" stroke="#4D9EFF" stroke-width="3" stroke-opacity="0.72"/>
  <path d="M960 334C910 334 884 334 855 334" stroke="#FF4D6D" stroke-width="3" stroke-opacity="0.72"/>
  <path d="M960 446C908 424 882 390 855 365" stroke="#00D9A3" stroke-width="3" stroke-opacity="0.72"/>

  <g transform="translate(280 562)">
    <rect width="840" height="48" rx="18" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <text x="30" y="31" fill="#A09EC0" font-family="Inter, Arial" font-size="16">Parser output: intent + tenant/room match + amount/date/method + confidence -> confirmation card -> action</text>
