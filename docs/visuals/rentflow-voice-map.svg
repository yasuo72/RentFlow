<svg width="1400" height="660" viewBox="0 0 1400 660" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101022"/>
      <stop offset="1" stop-color="#09131F"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6C63FF"/>
      <stop offset="1" stop-color="#00D9A3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1400" height="660" rx="40" fill="url(#bg)"/>
  <circle cx="700" cy="330" r="240" fill="#6C63FF" opacity="0.07"/>
  <text x="70" y="78" fill="#F0EFF8" font-family="Sora, Inter, Arial" font-size="42" font-weight="850">Voice command map</text>
  <text x="70" y="118" fill="#A09EC0" font-family="Inter, Arial" font-size="20">Hindi + English commands are routed into safe previews before action.</text>

  <g filter="url(#shadow)">
    <g transform="translate(545 190)">
      <circle cx="155" cy="155" r="126" fill="url(#mic)"/>
      <circle cx="155" cy="155" r="150" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="18"/>
      <path d="M155 94V166M127 145C127 184 183 184 183 145M155 205V234M124 234H186" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round"/>
      <text x="42" y="334" fill="#FFFFFF" font-family="Sora, Inter, Arial" font-size="27" font-weight="850">Tap mic and speak</text>
      <text x="72" y="366" fill="#A09EC0" font-family="Inter, Arial" font-size="16">Preview first, save after confirm.</text>
    </g>

    <g transform="translate(80 180)">
