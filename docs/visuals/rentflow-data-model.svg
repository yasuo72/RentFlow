<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F9FC"/>
      <stop offset="1" stop-color="#EEF1FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#6C63FF"/>
    </marker>
  </defs>

  <rect width="1400" height="720" rx="40" fill="url(#bg)"/>
  <text x="70" y="78" fill="#09090F" font-family="Sora, Inter, Arial" font-size="42" font-weight="850">Database relationship map</text>
  <text x="70" y="118" fill="#5C5A7A" font-family="Inter, Arial" font-size="20">Core MongoDB collections behind rooms, tenants, payments, documents, expenses, and audit logs.</text>

  <g filter="url(#shadow)" font-family="Inter, Arial">
    <g transform="translate(90 190)">
      <rect width="230" height="172" rx="26" fill="#FFFFFF"/>
      <rect width="230" height="54" rx="26" fill="#6C63FF"/>
      <text x="24" y="36" fill="#FFFFFF" font-size="20" font-weight="850">User</text>
      <text x="24" y="82" fill="#5C5A7A" font-size="15">name, phone, role</text>
      <text x="24" y="112" fill="#5C5A7A" font-size="15">fcmToken, isActive</text>
      <text x="24" y="142" fill="#5C5A7A" font-size="15">lastLogin</text>
    </g>

    <g transform="translate(470 170)">
      <rect width="250" height="198" rx="26" fill="#FFFFFF"/>
      <rect width="250" height="54" rx="26" fill="#00D9A3"/>
      <text x="24" y="36" fill="#FFFFFF" font-size="20" font-weight="850">Room</text>
      <text x="24" y="82" fill="#5C5A7A" font-size="15">roomNumber, floor</text>
      <text x="24" y="112" fill="#5C5A7A" font-size="15">monthlyRent, deposit</text>
      <text x="24" y="142" fill="#5C5A7A" font-size="15">status, photos</text>
      <text x="24" y="172" fill="#5C5A7A" font-size="15">currentTenant</text>
    </g>

    <g transform="translate(860 170)">
      <rect width="280" height="222" rx="26" fill="#FFFFFF"/>
      <rect width="280" height="54" rx="26" fill="#FFB800"/>
      <text x="24" y="36" fill="#111827" font-size="20" font-weight="850">Tenant</text>
      <text x="24" y="82" fill="#5C5A7A" font-size="15">fullName, phone</text>
      <text x="24" y="112" fill="#5C5A7A" font-size="15">whatsappNumber</text>
      <text x="24" y="142" fill="#5C5A7A" font-size="15">room, joiningDate</text>
      <text x="24" y="172" fill="#5C5A7A" font-size="15">documents[]</text>
      <text x="24" y="202" fill="#5C5A7A" font-size="15">openingDueAmount</text>
    </g>

    <g transform="translate(430 460)">
      <rect width="320" height="184" rx="26" fill="#FFFFFF"/>
      <rect width="320" height="54" rx="26" fill="#F43F5E"/>
      <text x="24" y="36" fill="#FFFFFF" font-size="20" font-weight="850">Payment</text>
      <text x="24" y="82" fill="#5C5A7A" font-size="15">tenant, room, month, year</text>
      <text x="24" y="112" fill="#5C5A7A" font-size="15">monthlyRentDue, amountPaid</text>
      <text x="24" y="142" fill="#5C5A7A" font-size="15">remaining, entries[]</text>
      <text x="24" y="166" fill="#5C5A7A" font-size="15">manualDue, carryForward</text>
    </g>

    <g transform="translate(840 470)">
      <rect width="250" height="150" rx="26" fill="#FFFFFF"/>
      <rect width="250" height="54" rx="26" fill="#4D9EFF"/>
      <text x="24" y="36" fill="#FFFFFF" font-size="20" font-weight="850">Expense</text>
      <text x="24" y="82" fill="#5C5A7A" font-size="15">category, amount</text>
      <text x="24" y="112" fill="#5C5A7A" font-size="15">room optional</text>
      <text x="24" y="136" fill="#5C5A7A" font-size="15">billPhoto</text>
    </g>

    <g transform="translate(110 470)">
      <rect width="250" height="150" rx="26" fill="#FFFFFF"/>
      <rect width="250" height="54" rx="26" fill="#111827"/>
      <text x="24" y="36" fill="#FFFFFF" font-size="20" font-weight="850">ActivityLog</text>
      <text x="24" y="82" fill="#5C5A7A" font-size="15">user, action</text>
      <text x="24" y="112" fill="#5C5A7A" font-size="15">entityType, details</text>
      <text x="24" y="136" fill="#5C5A7A" font-size="15">createdAt</text>
    </g>
  </g>

  <path d="M320 276H448" stroke="#6C63FF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M720 270H838" stroke="#6C63FF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M620 368V438" stroke="#6C63FF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M890 392L740 456" stroke="#6C63FF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1010 392L988 448" stroke="#6C63FF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M240 362V448" stroke="#6C63FF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M320 545H410" stroke="#6C63FF" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="356" y="258" fill="#5C5A7A" font-family="Inter, Arial" font-size="14">records</text>
  <text x="746" y="252" fill="#5C5A7A" font-family="Inter, Arial" font-size="14">assigned</text>
  <text x="652" y="420" fill="#5C5A7A" font-family="Inter, Arial" font-size="14">paid for</text>
  <text x="780" y="450" fill="#5C5A7A" font-family="Inter, Arial" font-size="14">belongs to</text>
</svg>
