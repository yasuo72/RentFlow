<svg width="1400" height="680" viewBox="0 0 1400 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09090F"/>
      <stop offset="1" stop-color="#101B2E"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6C63FF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00D9A3"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#6C63FF"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#00D9A3"/>
    </marker>
  </defs>

  <rect width="1400" height="680" rx="40" fill="url(#bg)"/>
  <circle cx="178" cy="116" r="170" fill="#6C63FF" opacity="0.14"/>
  <circle cx="1180" cy="560" r="210" fill="#00D9A3" opacity="0.12"/>

  <text x="70" y="84" fill="#F0EFF8" font-family="Sora, Inter, Arial" font-size="42" font-weight="800">RentFlow system architecture</text>
  <text x="70" y="124" fill="#A09EC0" font-family="Inter, Arial" font-size="20" font-weight="500">One shared database, many family phones, real-time updates, secure admin control.</text>

  <g filter="url(#shadow)">
    <g transform="translate(72 196)">
      <rect width="272" height="318" rx="34" fill="#161625" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="28" y="48" fill="#FFFFFF" font-family="Sora, Inter, Arial" font-size="24" font-weight="800">Flutter app</text>
      <text x="28" y="82" fill="#A09EC0" font-family="Inter, Arial" font-size="16">Android family devices</text>
      <rect x="28" y="118" width="216" height="44" rx="14" fill="#6C63FF" fill-opacity="0.16"/>
      <text x="48" y="146" fill="#C9C4FF" font-family="Inter, Arial" font-size="15" font-weight="700">Riverpod state</text>
      <rect x="28" y="176" width="216" height="44" rx="14" fill="#00D9A3" fill-opacity="0.14"/>
      <text x="48" y="204" fill="#70F5D0" font-family="Inter, Arial" font-size="15" font-weight="700">Dio REST client</text>
      <rect x="28" y="234" width="216" height="44" rx="14" fill="#FFB800" fill-opacity="0.14"/>
      <text x="48" y="262" fill="#FFD66D" font-family="Inter, Arial" font-size="15" font-weight="700">Socket.IO listener</text>
    </g>

    <g transform="translate(460 172)">
      <rect width="340" height="368" rx="38" fill="#111120" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="30" y="52" fill="#FFFFFF" font-family="Sora, Inter, Arial" font-size="26" font-weight="800">Express API</text>
      <text x="30" y="88" fill="#A09EC0" font-family="Inter, Arial" font-size="16">Node.js service on Railway</text>
      <g transform="translate(30 126)">
        <rect width="280" height="48" rx="16" fill="#1C1C30"/>
        <text x="20" y="31" fill="#E8E7F5" font-family="Inter, Arial" font-size="15" font-weight="700">JWT auth + role middleware</text>
        <rect y="62" width="280" height="48" rx="16" fill="#1C1C30"/>
        <text x="20" y="93" fill="#E8E7F5" font-family="Inter, Arial" font-size="15" font-weight="700">Rooms, tenants, payments, reports</text>
        <rect y="124" width="280" height="48" rx="16" fill="#1C1C30"/>
        <text x="20" y="155" fill="#E8E7F5" font-family="Inter, Arial" font-size="15" font-weight="700">Payment state + carry-forward</text>
        <rect y="186" width="280" height="48" rx="16" fill="#1C1C30"/>
        <text x="20" y="217" fill="#E8E7F5" font-family="Inter, Arial" font-size="15" font-weight="700">Activity logs + admin cleanup</text>
      </g>
    </g>

    <g transform="translate(912 172)">
      <rect width="416" height="368" rx="38" fill="#161625" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="32" y="52" fill="#FFFFFF" font-family="Sora, Inter, Arial" font-size="26" font-weight="800">Connected services</text>
      <text x="32" y="88" fill="#A09EC0" font-family="Inter, Arial" font-size="16">Storage, delivery, documents, receipts</text>
      <g transform="translate(32 126)">
        <rect width="160" height="78" rx="20" fill="#00D9A3" fill-opacity="0.14" stroke="#00D9A3" stroke-opacity="0.24"/>
        <text x="20" y="32" fill="#70F5D0" font-family="Inter, Arial" font-size="16" font-weight="800">MongoDB</text>
        <text x="20" y="58" fill="#A09EC0" font-family="Inter, Arial" font-size="13">Shared database</text>
        <rect x="184" width="160" height="78" rx="20" fill="#6C63FF" fill-opacity="0.16" stroke="#6C63FF" stroke-opacity="0.25"/>
        <text x="204" y="32" fill="#C9C4FF" font-family="Inter, Arial" font-size="16" font-weight="800">Cloudinary</text>
        <text x="204" y="58" fill="#A09EC0" font-family="Inter, Arial" font-size="13">Photos and docs</text>
        <rect y="98" width="160" height="78" rx="20" fill="#FFB800" fill-opacity="0.14" stroke="#FFB800" stroke-opacity="0.24"/>
        <text x="20" y="130" fill="#FFD66D" font-family="Inter, Arial" font-size="16" font-weight="800">Firebase</text>
        <text x="20" y="156" fill="#A09EC0" font-family="Inter, Arial" font-size="13">Push alerts</text>
        <rect x="184" y="98" width="160" height="78" rx="20" fill="#FF4D6D" fill-opacity="0.13" stroke="#FF4D6D" stroke-opacity="0.23"/>
        <text x="204" y="130" fill="#FF9AAF" font-family="Inter, Arial" font-size="16" font-weight="800">PDFKit</text>
        <text x="204" y="156" fill="#A09EC0" font-family="Inter, Arial" font-size="13">Receipts and reports</text>
      </g>
    </g>
  </g>

  <path d="M352 314H438" stroke="#6C63FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M800 314H890" stroke="#6C63FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M890 394H812" stroke="#00D9A3" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <path d="M438 394H356" stroke="#00D9A3" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <g transform="translate(186 574)">
    <rect width="1028" height="56" rx="20" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <text x="30" y="36" fill="#F0EFF8" font-family="Inter, Arial" font-size="17" font-weight="700">Live loop:</text>
    <text x="116" y="36" fill="#A09EC0" font-family="Inter, Arial" font-size="17">payment saved -> MongoDB updated -> Socket.IO event -> family devices refresh -> FCM notification delivered</text>
  </g>
</svg>
